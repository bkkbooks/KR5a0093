front:
  text: 元始无量度人上品妙經註解卷中徃五
  hash: sha256:73cabf6403ca2085e90c4b50e04fb37d0bf2bed331e18f1373c66291cfa8dfae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0093_HFL_002-001a, image: hfl/0046/0046-132.png}
body:
  text: 九江冰湖埜人薛季昭顯翁註解此正經乃元始所說故直曰元始无量度人表元始以此經開度无量也元始洞玄靈寳本章元始天尊說此經以泄三洞玄妙之道也道君受元始洞玄之旨以爲靈寳修眞之本演而成章此言本經上下二章上品妙首十迴度人百魔隱韻離合自然二章乃上品衆妙之首當來元始十徧說經之㫖也所言皆百魔祕㫖聚則爲炁散則爲文一離一合皆自然也此正經之小序混洞赤文无无上眞此下皆言祖劫開化之事混沌之初空洞之炁累經劫火鍊成赤文天尊於无无之中以此赤文爲諸上高眞度人之本元始祖劫化生諸天龍漢赤明上皇延康開皇皆劫名也祖劫者始劫也化生諸天者謂由龍漢始青祖炁而開化也開明三景是爲天根祖劫玉清一炁生二而爲上清二炁生三而爲太清三炁生九炁而生九天九天之上又别而爲三十二天每一天各有一日月星是爲三景開者豁也明者光也天根者元始祖炁爲化生諸天之根本也上无復祖惟道爲身自元始以上无復本祖惟此道爲身耳言萬法皆從元始本身起祖也五文開廓普植神靈混洞赤文經劫火成章之後演爲五天之炁化爲五炁之文自无无中化生萬有三界神靈普皆從此赤文而植立焉无文不光无文不明无文不立无文不成无文不度无文不生所以天地萬物无此赤文則不光顯不明亮不建立亦不成就不開度亦不生化昔天眞皇人云非混洞赤文則不能攝化九陽明天度而成天境也是爲大梵天中之天已上並言祖劫之事是爲混洞大梵之炁融結赤文開化諸天此玉清一天實諸天最尊也鬱羅蕭臺玉山上京此天之下有玉京山與崑崙山相對周迴八百餘里上有鬱羅蕭臺之境上極无上大羅玉清此皆梵炁結成而爲上上无極之最上大羅玉清之境眇眇劫仞若亡若存玉清上境高出諸天微眇難見經劫不壞非仞尺可量目力可窮似有而似无者也三華離便大有妙庭三華堂離便宫大有宫妙庭宫皆元始所治玄都中宴息之所金闕玉房森羅淨霐大行梵炁周回十方更有黄金闕白玉房森羅上館淨霐之池其間廣大流行皆是玉清梵炁周徧回轉運行十方无有止息此上並言玉清境界中有度人不死之神中有南極長生之君玉清元始劫劫之祖每一劫終出法度人元始於此劫中開赤明圖以此赤文化開混洞混洞化開彌羅是以大丹天内有梵寳丹靈赤帝君鍊眞陽精開度衆生无量曰長生曰不死皆火府尊神之稱中有度世司馬大神中有好生韓君丈人亦朱陵火府鍊眞度仙之司屬度世君主陽九百六之數司馬君主滅邪却試之事好生君則青華之别名韓君丈人號可韓統五帝也中有南上司命司録延壽益算度厄尊神南上者火府南陵上宫司命以下皆分火府之治職予奪功過灾福於人回骸起死无量度人如世人尸解者身經太陰者皆回骸起死之義如此等人其開度者无量今日校録諸天臨軒今天尊於赤明劫初浮黎國内開圖校録諸天乘天尊道力皆來臨軒陛之下校者比量罪福輕重録者記載功過淺深東方无極飛天神王長生大聖无量度人南方无極飛天神王長生大聖无量度人西方无極飛天神王長生大聖无量度人北方无極飛天神王長生大聖无量度人東北无極飛天神王長生大聖无量度人東南无極飛天神王長生大聖无量度人西南无極飛天神王長生大聖无量度人西北无極飛天神王長生大聖无量度人上方无極飛天神王長生大聖无量度人下方无極飛天神王長生大聖无量度人東方神王諱總南方諱飛西方諱雲北方諱无鏡東北諱梵東南諱那郁西南諱度仙西北諱钁无上方諱瑛下方諱落此即十方救苦天尊化現也十方至眞飛天神王長生度世无量大神昔十方天尊自赤明劫來浮黎國内開校圖録之日奉元始勅命掌十方三界校量功德開度无量並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈旛十方國土聽法而來所乘御者輪輦輿蓋所導引者龍鳳旛節前嘯九鳳齊唱後吹八鸞同鳴師子白鶴嘯歌邕邕所吹唱歌嘯者鳳鸞師鶴邕邕者和鳴也五老啓途群仙翼轅開啓前途則有始眞皇玄元之五老輔翼車轅則有十方諸仙衆眞億乘萬騎浮空而來十千爲萬十萬爲億仙眞騎乘浮空馭炁來至道前傾光回駕監眞度生傾注圓象回環法駕監臨衆眞開度衆生諸天丞相南昌上宫三十二天各有丞相南昌即丹天世界上宫即南陵火府學人仙化必經此宫鍊形韓司主録監生大神韓司者即宫中丈人主録鍊度文籍監生者主生魂鑄魄更生之别名也執籙把籍齊到帝前十方至眞大神並抱執算度之籙籍俱會帝前以遷舉也隨所應度嚴校諸天隨學人功德應合度者委諸天嚴行而校量之以上並宫考校學人功過及世人罪楅也普吿三界無極神鄉然後普行告下天地水府三宫无極者盡三界諸神之鄉皆令知聞也泉曲之府北都羅酆泉曲者在北溟之最下北都者北陰酆都陰氣重濁凝結成山曰酆都山也上參大羅下極風泉山高九億九萬九千九百周回九萬里黑氣滲滲停收罪魂皆在此山之中也三官九署十二河源山有三宫上元宫去天稍近天官主之中元宫在山之左地官主之下元宫在山之右去風壘近水官主之此三宫各有三府府有百二十冥曹盡酆都官吏考罪魂之所九署即九州九壘土皇九令之司十二河源者即十二水神之府水始出處曰源一河源所在即有一司分治上解祖考億劫種親今天尊當劫運之終告下三界先將合受度學人自元始已來及至今日歷世宗親盡行超度然後受鍊疾除罪簿落滅惡根不得拘留逼合鬼群天尊告下即令疾速除去罪籍削絶惡業之根不得拘執留滯混入衆鬼囚之中元始符命時刻昇遷方可應元始開光符命而得一時一刻升神於上清矣北都寒池部衛形魂朔單鬰絶之都乃酆都洞陰之境其山寒炁之極下有寒冰之池北陰天帝主之天尊勑下北都令所部鬼神護衛形魂之神使不散壞制魔保舉度品南宫制御所屬之魔衆各令保舉學人依南昌受鍊格皆九年之品昇上南宫也死魂受鍊仙化成人已死之魂鬼質未盡必須南宫經受大鍊然後消去穢質羽化而成仙人生身受度劫劫長存隨劫輪轉與天齊年生身者由父母精血而成形也其魂一經南宫之鍊度則非幻化色身而得億劫長存者也劫終劫始身隨運轉可與諸天相齊年劫也永度三徒五苦八難超凌三界逍遥上清三徒者三惡門名也一曰色慾門上尸道天徒界二曰愛欲門中尸道水徒界三曰貪欲門下尸道地徒界此爲三惡門一名三尸道一名三徒界在人身中喜爲惡事斷人命根遏人學仙之路抑人飛騰之魂五苦者一名五道門也第一名色累苦心門又曰泰山地獄苦道第二名愛累苦神門又曰風刀苦道第三名貪累苦形門又曰提石負山苦道第四名華競苦精門又名填海作河苦道第五名身累苦魂門又曰吞火食炭鑊湯苦道此五苦五道在人身中遏人招眞之路斷人修仙之門八難者三徒五苦合而爲八難也又曰三徒者一曰長夜徒二曰寒池徒三曰摙石徒五苦者一曰刀山苦二曰劍樹苦三曰鑊湯苦四曰爐炭苦五曰考謫苦又一曰三徒者三官徒役也一曰天官徒役奔雷走電二曰地官徒役擔山負石三曰水官徒役摙汲溟波五苦者登刀山履劍樹入鑊湯抱銅柱吞火食炭也八難者八門幽曠之難也夫學諸上道之士當先斷除諸累絶滅苦難則眞炁自降神仙自成即得超登三界遨遊乎上清矣此言學士祖考受鍊己身得度上清之天天帝玉眞无色之境梵行上清之天道君爲化主其中天人修鍊成眞如玉之純无色之界元始爲化主天中純是梵炁流行學人昇遷至此則與道合眞矣東方八天誦自太皇以下須存想各天帝相貌服色雲炁仍默誦各帝名諱元始積九陽梵炁而成天境此八天自北始南行帝服青冕青服青裳青雲九重有九色玄龍導引于天帝前後太皇黄曾天帝鬱繿玉明一名淨天其色黄宿次奎璧世人修十善者昇此天尚有欲根故曰欲界帝諱觀覺鬱繿者天帝内名玉明者魔王隱音也元始以金書玉字祕于天之紫微宫太明玉完天帝須阿那田一名勝妙天其色緑宿次璧世人修二十善昇此天須阿即天王内名那田即天王隱音元始以玉簡金書祕于天之紫房宫清明何童天帝元育齊京一名光天其色黑宿次室世人修四十善三根淨者昇此天元育即天王隱諱齊京即眞人内文元始以紫簡金書祕于天之九晨宫玄胎平育天帝劉度内鮮一名梵天其色赤宿次危世人修六十善四根净者昇此天劉度内鮮即帝君隱諱无始以金簡玉書秘于天之元景宫元明文舉天帝醜法輪此天色蒼宿次虚世人修八十善五根淨者昇此天醜即天君内文法輪即帝之異號元始以金書玉字祕于天之廣寒宫上明七曜摩夷天帝恬懀延一名自在天其色黑宿次女世人修一百善六根淨者昇此天恬懀即天帝内音延即天王隱號元始以玉簡金書祕于天之太陰宫已上屬欲界六天此天去凡世五百二十億萬里乃風霄之界天中人壽不等其快樂最勝諸天也但初出凡界色相未斷或手接或眼視或身或言皆欲也若天人斬次修習梵行則昇于第二色界虚无越行天帝正定光一名初梵天其色碧宿次牛天人欲根雖淨尚有色塵正定光三字天君内文也元始以紫册金書祕于天之太玄宫太極濛翳天帝曲育九昌一名二梵天其色紫宿次斗天人一色塵麤淨乃昇此天曲育即天之隱號九昌即帝之隱文元始以蘂簡琅書祕于天之玄都宫也南方八天此八天並前虚无太極二天屬色界元始積三陽梵炁而成天境此八天自東始西行帝服青冕赤旒朱衣黄裳絳雲三重有朱雀鳳凰導引前後赤明和陽天帝理禁上眞一名上光天其色白宿次箕斗天人二色塵麤淨乃昇此天理禁上眞四字即天王隱號也元始以玉簡瓊書祕于天之長明宫也玄明恭華天帝空謡醜音此天色黄宿次箕天人三色塵麤淨乃昇此天空謡醜音四字即天君總號元始以玉册金書祕于天之東華宫燿明宗飄天帝重光明此天色緑宿次尾天人四色塵麤淨者乃昇此天重光明三字即天君總號元始以玉册金書祕于天之浩元宫竺落皇笳天帝摩夷妙辯一名初淨天其色青宿次心天人五色塵麤淨乃昇此天摩夷即天帝隱諱妙辯即帝之内名元始以紫册金書祕于天之清玄宫虚明堂燿天帝阿𨚧婁生一名嚴淨天其色赤宿次房天人六色塵麤淨乃昇此天尚有細塵阿𨚧即天王隱音婁生即帝之梵號元始以玉字金書祕于天重華宫觀明端靖天帝鬱密羅千此天其色蒼宿次氐天人一細塵淨乃昇此天鬰密即天帝隱文羅千即天君内號元始以蘂簡金書祕于天之光華宫玄明恭慶天帝龍羅菩提此天其色黑宿次亢天人二細塵淨昇此天龍羅飛天内音菩提即帝之隱號元始以金簡瓊書祕于天之閶闔宫太焕極瑶天帝宛黎无延此天其色碧宿次角天人三細塵淨昇此天宛黎无延四字即天王内音元始以琅篇素書祕于天之帝康宫西方八天此人天并前十天屬第二色界元始積七陽梵炁而成天境此八天自南始北行帝服青冕青旒白衣黄裳緋襈素雲七重有白虎師子導引前後元載孔昇天帝開眞定光此天其色紫宿次軫角天人四細塵淨乃昇此天開即天帝内音眞定光即天王隱諱元始以玉册金書祕于天之延命宫太安皇崖天帝婆婁阿貪一名極樂天其色白宿次軫天人五細塵淨乃昇此天婆婁即天帝内音阿貪帝魔内名元始以金書玉刻秘于天之開明宫顯定極風天帝招頁童一名廣樂天其色黄宿次翼天人六細塵雖淨六輕塵染招眞童三字即天君秘號元始以瓊笈素字秘于天之大赤宫始皇孝芒天帝薩羅婁王此天色縁宿次張天人一輕塵淨乃昇此天薩羅婁王即玉眞内文元始以紫册琅篇祕于天之大丹宫太皇翁重浮容天帝閔巴狂此天色青宿次星天人二輕塵淨乃昇此天閔巴狂三字即帝君内文元始以玉册金書祕于天之華蓋宫无思江由天帝明梵光此天色赤宿次柳天人三輕塵淨乃昇此天明梵光三字即天帝内號元始以寳篆雲章秘于天之太玄宫上揲阮樂天帝勃勃監一名自在天其色蒼宿次鬼天人四輕塵淨乃昇此天勃勃即天君内文監即帝之内號元始以琅書玉字秘于運靈宫无極曇誓天帝飄弩穹隆此天色黑宿次井天人五輕塵淨乃昇此天也天人到此不復下墮飄弩即天魔内文穹隆即天君隱諱元始以錦囊玉字祕于天之中元宫已上並屬色界此天去欲界三十萬里乃丹霞之景天人雖無情欲尚有形色可見若漸次修習塵染頓盡則昇于无色界也北方八天四天爲无色界四天爲四種民天總屬玉清炁元始積五陽梵炁而成天境此八天自西始東行帝服青冕白旒皁服朱裳黑雲五重有玄龜羽蓋導引前後皓庭霄度天帝慧覺昏一名空无天其色碧宿次參井天人輕染雖淨尚餘染習慧覺昏三字即帝君内音元始以金書玉字秘于天之瓊瑶宫淵通元洞天帝梵行觀生一名識无邊處其色紫宿次參天人色塵都忘但有心識漸入炁觀梵行即天王内音觀生即帝之隱諱元始以碧簡玉書祕于天之眞元宫太文翰寵妙成天帝那育醜瑛一名无所有處其色白宿次觜天人心識兩忘炁觀轉妙那育醜瑛即魔王内文也元始以玉書金字秘于天之幽靈宫太素秀樂禁上天帝龍羅覺長一名非想非非想天其色黄宿次畢天人無想可忘炁觀轉妙龍羅即天王内諱也覺長乃帝之隱文元始以瓊書玉字祕于天之仙靈宫此四天屬无色界此天去色界三十六萬里乃碧霞之景天人身形微妙无復色象修學之者若至此天更能進修即昇上四種民天也太虚无上常融天帝總監鬼神此天色緑宿次昴天人初出三界結習頓忘清淨无染喜樂无爲炁入神觀總監鬼神四字乃帝君都諱攝魔内音元始以玉刻玉字秘于天之萬福宫太釋玉隆騰勝天帝眇眇行元此天色青宿次胃天人喜樂頓除神觀轉妙眇眇行元四字即天帝之隱號元始以金書金字祕于天之白蓋宫龍變梵度天帝運上玄玄此天色赤宿次婁天人无染證不空果飛行自在運上即天王内文玄玄即玉眞内音也元始以金書玉刻祕于天之靈寳宫太極平育賈奕天帝大擇法門此天色蒼宿次奎天人出二炁之外無年壽之限到此究竟轉入三境也大擇法門四字即天王之總文元始以玉書紫字祕于天之天寳宫已上四天乃四種民天也此天在大羅之下去无色界一百三十五萬八千里乃太虚之境天人既昇此天者則諸塵漏盡飛行元炁上朝三境如劫運將終此天不壞天中聖人降凡開化爲民之種生神章云以充種民是也一十二天三十二帝九天之上無陰九地之下無陽三天處於玄極无色界四種民天之上元始天尊居无上大羅之絶頂道藏云第一天玉清爲金宫元始居之第二天上清爲火宫靈寳居之第三天太清爲土宫老君居之每一宫分三宫三清行數九宫故曰九清三十二天俱在九清之下諸天隱諱諸天隱名每一天各有一帝每一帝各有其内名隱諱也天中空洞自然靈章皆是元始空洞之炁自然結成靈異之章諸天隱韻天中之音天中之尊天中之神天中大魔天中之靈諸天之中各有隱蔽聲韻空洞妙音所以上聖高眞尊而無上神而莫測也大魔者即三界魔王也靈即監度諸靈官也九和十合變化上清九爲陽天數也十爲陰地數也陽爲律陰爲吕此空洞靈章自然和合陰陽律吕之妙諸天皆依憑之變化飛空遊行上清也无量之奥深不可詳靈章開化實爲無量奥妙淵深不可詳測敷落神頁普度天人皆元始當來開化以此靈章敷布流落秘于諸天使諸神眞執持天炁開度天人普度者普皆受其開度也此言天中名諱皆空洞之炁自然結成之妙今日欣慶受度歷關諸天人得受度則非凡夫自然喜慶歷關者是天尊勑下以所受度之人編歷關告使諸天皆知今日某人當受度也請滅三惡斬絶地根請爲滅去某人三惡之道斬絶當來地獄根種子也飛度五户名列太玄當得飛昇度出五苦之門則名姓列之於太玄丹籍也魔王監舉无拘天門勅攝魔王監臨保舉各令超入三界之上更无拘滯於天門也東斗主算西斗記名北斗落死南斗上生中斗大魁總監衆靈東斗五星主生炁號主算君西斗四星主成物號記名君北斗七星號落死君故於注死薄上黜落死名南斗六星號上生君故於長生籙上添上生名中斗三星乃斗中大魁故總攝監視受度之人一曰中斗爲炁之大帥總監一切神靈生死罪福之事也天尊首勅五斗之君保舉受度學人也青帝護魂白帝侍魄赤帝飬氣黑帝通血黄帝中主萬神无越青帝治肝而護三魂帝姓閻諱開明字靈威仰能使人三魂通靈也白帝治肺而侍魄帝姓上金諱昌開字耀魄寳能令七魄不亂也赤帝治心而養氣帝姓洞浮諱極炎字赤熛弩主火能生養元氣也黑帝治腎而通血帝姓黑節諱靈會字隱局即大元水帝也水在人身中爲血能周流於一身也黄帝主土氣鎮於脾帝姓通班諱元成字含樞紐乃黄庭之中神意所在管攝一身之神無令差越也此乃天尊勅制五帝保護學人魂魄氣血神意令其與道合眞矣青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黄天魔王横天擔力青天魔王姓斌諱齒成巴主領天魔每耗人肝氣令人喜怒不常赤天魔王姓弗名由肅主領地魔勢能揭天力能傾山每耗人心氣令人狂暴白天魔王姓赤名張市一頭六目主領金石山川之魔能破山反石每耗人肺氣令人貪愛黑天魔王姓徐諱直事主領四海九江川澤之魔爲姓兇醜而好殺害每耗人腎氣令人多慾黄天魔王姓天門諱波狂主領四方魔精每耗人脾氣令人好貪飲食多生疾病也天尊勅制五天魔王保護學人驅除魔試令得仙道五帝大魔萬神之宗青帝魔王姓迫落諱萬刑赤帝魔王姓赭諱上柏白帝魔王姓鄧諱吁兒黑帝魔王姓梟諱公孫黄帝魔王姓宛躬諱産生其職主領三界功等諸天爲鬼神之宗也一曰五帝各有御魔總眞靈符分衛五方青帝符吏名啓華赤帝符吏名明眞白帝符吏名茂成黑帝符吏名守元黄帝符吏名叔眞各領神兵守衛靈文以御魔也飛行鼓從總領鬼兵此明五帝大魔常部領鬼兵飛行太虚之中以音聲鼓吹之從故曰飛行鼓從也麾幢鼓節遊觀太空此明大聖出入遊行儀飾麾者旗屬注羽毛於竿首似旌旗之狀幢者亦旛幢也鼓節者擊鼓流吹以爲音樂節奏也五帝大魔各自部領萬衆建立麾幢鼓節遊觀太虚之中自號赫奕諸天齊功帝魔與元始同生故自號爲赫奕之神掃蕩祅魔保舉學人與諸天功勳相爲齊並上天度人嚴攝北酆諸上天眞以度人故嚴行統攝令下北酆使諸魔不令惱害學人也北都羅酆之山有六洞鬼魔好絶人善事不嚴攝之則惱害初眞得度者神公受命普掃不祥神公即大羅神公也諱廓奕號馬龍氏受天尊符命掃除不祥也八威吐毒猛馬四張天丁前驅大帥仗旛八威神吐火攝毒猛馬神四面張威天丁神爲之前引大帥神與之持旛擲火萬里流鈴八衝擲火神飛光萬里之遠流鈴神振響八方之衝也敢有干試拒遏上眞敢有邪魔干試拒遏於學上道修眞之人也金鉞前戮巨天後刑鉞者斧屬以金飾之故名金鉞巨天者力士也若有邪魔敢行干觸塞遏上眞者則金鋮於前而斧戮巨天掠後以刀刑又云天丁力士前誅後斬除滅鬼精也屠割鬼爽風火無停千千截首萬萬剪形凡此等魔鬼速須屠割而殺之急若風火毋得停止也千千萬萬者言其多也或斬截其首或剪滅其形也魔無干犯鬼無祅精既屠割剪截之後則邪魔更無干犯鬼魅永絶祅精三官北酆明檢鬼營三官行下北都羅酆之中明白檢察鬼群之衆不得干犯學仙者也不得容隱金馬驛呈又復告誡羅酆部屬不得容匿鬼黨即馳金馬走驛來呈也普吿無窮萬神咸聽普告天上天下無極神鄉一切神靈咸使聽伏三界五帝列言上清三界即欲界色界无色界之魔王也五帝即五帝大魔也並皆列言舉功保度學者上登上清之境也天尊勅制魔王保舉學人滅除魔試右正經上章前段元洞玉曆龍漢延康昔元始肇形五劫開化乃命天眞皇人以玉曆紀劫運流傳之本元洞者以明祖炁也玉曆者以紀天元也劫運五周復歸于一自一炁化分三因成九若龍若蜒蟠曲九道以總九陽祖炁之元此龍漢劫中元始帝尊出法度人之事也龍漢劫乃始青之炁開九陽之梵華延康劫乃素靈之炁開七陽之梵英眇眇億劫混沌之中上无復色下无復淵眇眇者不可紀極猶如混沌之中太凡一劫運終則三光幽暗天地混沌如初道歸本源萬物失一則上有何色下有何淵風澤洞虚金剛乘天風澤之炁虚而空洞下依乎地金剛之炁精而不雜上乘乎天天上天下无幽无冥无形无影无極无窮溟涬大梵寥廓无光天上地下幽隱冥暗不可區别无色象之可睹无窮極之可度惟一自然大梵之炁溟涬寥廓而无光明也此引龍漢祖劫之事以啓赤明第二劫開圖之㫖赤明開圖運度自然天地再造至赤明元年劫運始開重生海嶽元始以自然火鍊赤文開圖度人所謂運度者六十年一甲子一百年一中期一千年爲小劫三小劫爲一大劫運度之數皆混沌自然之炁而生之元始安鎮敷落五篇天地既立尚拘劫運元始乃睹火鍊之眞文因雲篆之結成敷散分落安鎮諸天五篇者其一太上太清九眞安化上愛玉符其二太上交神生明玉化符其三太上眞皇混册肅玄符其四八威禁龍制虎飛英太白玉化符其五明綱玄兆大明九化符赤書玉字八威龍文書經火鍊故曰赤書字經玉刻故曰玉字文如龍飛之狀故曰龍文八威者龍飛走八方之威勢也保制劫運使天長存此言赤書眞符龍文並能制御劫運消劫否終使天地長乆而無傾覆也梵炁彌羅萬範開張大梵祖炁天地之根元始乘此虚梵之炁彌羅諸天範者法也萬法皆從此而開布分張也元綱流演三十二天輪轉无色周回十方祖炁乃天元之綱紀流行于三十二天之中也如輪而運自无色界始然後周徧於十方也旋斗歷箕回度五常天罡左旋諸星右轉始於斗宿終於箕宿歷二十八宿而一周天回旋五星之常度而成人間一歲之炁運也三十五分總炁上元二十八宿及日月金木水火土五星而成三十五周天之分野皆總受高上天元之炁也此結集第二劫赤文再立天地之功八景冥合炁入玄玄八景者指神霄玉清下統八天梵炁也始青天則太霄炁太青天則青霄炁始丹天則碧霄炁太丹天則絳霄炁始素天則景霄炁太素天則玉霄炁始玄天則琅霄炁太玄天則素霄炁冥合者諸天八景之炁皆與神霄玉清眞王祖炁冥冥參合而變化無窮也玄之又玄何可名狀玄中太皇上帝高眞玄中者紫微天宫玄都中宫也太皇者明皇道君上帝高眞皆玄都中靈眞至眞汎景太霞嘯詠洞章此上衆眞常浮汎八景之炁於太霞之上嘯詠空洞靈章開化人天金眞朗郁流響雲營金眞梵炁朗郁成文嘯歌流演飛聲雲營道之動也玉音攝炁靈風聚煙玉音寂然收攝梵炁靈風靜默聚合凝煙道之靜也紫虚鬱秀輔翼萬仙此皆紫皇虚无梵炁鬱然秀發輔翼學人修眞成仙也千和萬合自然成眞薛幽棲註曰言修謫之人若千眞和其神萬道合其炁眞與神混體道與炁合形自然而成眞也頁中有神長生大君學道修眞之士當知身中皆有諸神上應于天長生大君斗中尊星在人則居臍下命門也无英公子白元尊神无英在人身則居肝號公子白元在人身則居肺號尊神亦斗中二神也太乙司命桃康合延四神名皆斗中眞人也在人則太乙在腦司命在心桃康在臍左合延在腎右執符把籙保命生根此上諸斗眞降在人則爲身之神在天則執符把籙保人形命受生之根使之長生上遊上清岀入華房其神上則遊行上清之境出入丹華之房華房者即丹天太微之房也八冥之内細微之中八冥即八極也細微即毫末也言此諸神則大无不處細无不入或舒布於八冥之中或貫穿於一毫之末下鎮人身泥丸絳宫其神下則安鎮人身之中或在泥丸或居絳宫泥丸在腦從眉間却入三寸絳宫者即心也中理五炁混合百神人居天地之間調理五行之炁則九竅百神與道合眞矣十轉回靈萬炁齊仙人能如此顛倒五行十轉而回旋之修鍊靈光陽神出現仙不難齊矣十者陰陽之成數也如乾九坎一坤六離四巽二兊八艮三震七皆合而成十此言學士修鍊成眞之由仙道貴生无量度人仙道所貴唯在於生故无量度人不可勝算也上開八門飛天法輪八天之上八帝各開一長生之門登引仙眞天中又有飛天神王轉動无上法輪使之解脱罪楅禁戒宿命因縁作罪作福各有禁戒宿世命根善惡因縁轉此法輪則彼脱苦輪矣普受開度死魂生身由是普皆得受太上開度之恩已死之魂亦可更生如身經太陰而返形陽仙也身得受生上聞諸天身既受度則有度世大神爲之具列名姓告聞於諸天矣諸天之上各有生門天天各有長生之門昇進學人校録有差等也此言受報既終當得受度者也右正經一章下段此下謡歌乃正經下章中有空洞謡歌之章諸天各有空洞謡歌皆勸勉學人之章也魔王靈篇辭參高眞此章是魔王所述至神至靈辭意皆參合於高眞也此魔王歌章之序引第一欲界飛空之音欲界自皇曾天至摩夷天此六天爲欲界之分此天最居下位中有魔王字郁默此天中人有形有欲觸物染著故曰欲界也魔王於此界中謡歌此音變化飛空故曰飛空之音也人道眇眇仙道莽莽人道甚微眇而易失仙道甚莽大而難證鬼道樂兮當人生門鬼道喜耽欲樂阻當學人長生之門也天道貴生鬼道貴終天道尚昇故貴乎生鬼道尚墜故貴乎終仙道常自吉鬼道常自凶升入仙道則多吉慶淪墜鬼道則多凶害高上清靈爽悲歌朗太空諸上高眞鐘靈秀之炁者每悲哀此界天人易入鬼趣故於空中朗然形之歌詠以勸勉之惟願仙道成不欲人道窮但欲此界天人證成仙果不欲窮而墜下流入鬼趣也北都泉曲府中有萬鬼群若此界天人不知修證報盡輪迴必淪墜於北都拘入鬼黨之中矣但欲遏人算斷絶人命門命門即生門也北酆鬼衆專好遏絶人長生之門也阿人歌洞章以攝北羅酆此界内最尊者故稱阿人洞章即此飛空之音魔王歌此章警戒天人攝伏魔鬼束送祅魔精斬馘六鬼鋒欲魔襲人甚於鋒刃著體束送斬馘者皆斷絶之義六鬼者即六情所染色聲香味觸法之六欲也諸天炁蕩蕩我道日興隆欲界中諸天正炁蕩蕩然而流行无復魔障我昇仙之道日漸興旺矣第二色界魔王之章色界自虚无越衡天至曇誓天此十八天皆色界之分居于欲界之上故曰第二也中有魔王諱摩羅此中天人有形无欲故曰色界魔王統管此界故歌此章以勸勉學人也落落高張明炁四騫色界十八天落落然高出於欲界六天之上張者列也梵炁光明朗照四方騫者遠也開也梵行諸天周迴十方梵炁流行於諸天周旋回環於十方也无量大神皆由我身我有洞章萬徧成仙此中无量大神皆我魔身化現也洞章即此歌也天人讀之萬徧立證仙眞矣仙道貴度鬼道相連仙尚超度鬼尚墜落仙道鬼道常相連屬進則仙退則鬼學仙道者宜謹之天地眇莽穢氣紛紛眇莽者言天地廣大眇茫莽蕩也穢氣者色塵也紛紛者雜也此界天人尚染色塵未能離色不免失墜三界樂兮過之常存能於三界之中樂然離色忘塵則可徑得超過色界昇上无色之界可以長存矣身度我界體入自然有能修證離色忘塵度出我界身入自然與道合眞矣此時樂兮薄由我恩到此時節寂滅爲樂皆由我章勸勉之恩保度得入三清之境薄者魔王自謙之辭龍漢蕩蕩何能别眞龍漢劫中梵炁蕩蕩乃玉清境天人稍有塵累未可證入如引入黍珠但只仰看而已眞偽可知我界難度故作洞文我界群魔多諸幻惑爲此難度故作洞章以勸學者勉力而修進也變化飛空以試爾身魔王自言我形神變化現飛空以試爾等諸天人身修證如何成敗懈退度者幾人其間天人十成九敗懈怠退步能修證者幾人也哉笑爾不度故爲歌音魔王自言我嗤笑爾等不求自度故作此歌章以勉之第三无色界魔王歌曰自霄度天至禁上天此四天爲无色界也在色界之上故曰第三此天之人形欲俱空故名无色魔王諱韶作此謡歌之音三界之上眇眇大羅无色界雖超出欲色二界之上其視大羅尚眇眇而難見也上无色根雲層峨峨大羅天上无有色根色根者猶言六根也色根既无色塵亦无但見雲炁層層而高積爾唯有元始浩劫之家唯有元始居此大羅之上劫終劫始開化度人元始乃浩劫之家部制我界統承玄都我界中天人皆屬元始部制承受玄都之統率玄都者紫微上宫也有過我界身入玉虚有超過我无色界者其身便證入乎玉虚眞境也我位上王匡御衆魔魔王自言我居此天最上王位而匡伏於衆魔也空中萬變穢氣紛葩飛空之中千變萬化昇度學人使之證眞而塵穢之炁常紛華天人耳目保眞者少迷惑者多天人雖離染忘色未能遣忘猶以心識爲患故保者少而迷者多仙道難固鬼道易邪人道者心諒不由他仙道難守心識一惑流入鬼邪凡欲證眞人者只忘心自遣而已諒想不在乎他仙道貴實人道貴華夫修仙之道道貴於眞實行人之道道貴於浮華爾不樂仙道三界那得過爾等天人不好樂仙道眞實或於心識决不能遣有入妙如何得超出三界矣其欲轉五道我當復奈何爾等不能遣有畢竟迷惑何由離轉五苦之道故魔王自言如此我却不奈爾何也此三界之上飛空之中魔王歌音音參洞章言此歌雖出於魔王之口其音却參合乎大洞之章誦之百徧名度南宫誦之千徧魔王保迎萬徧道備飛昇太空過度三界位登仙公有聞靈音魔王敬形勅制地祇侍衛送迎按薛幽棲曰言誦此魔王之章百徧即名籍昇度南上朱宫千徧即魔王保護出入送迎萬徧之道既備則駕龍昇乎太清遊行太空即身超三界位登仙公矣有聞靈音者謂聞靈寳本章也道君歎辭有聞我靈寳本章之人若能持誦修鍊即得三界魔王敬其形體復勅勒土地祇靈侍衛送迎之也拔出地户五苦八難七祖昇遷永離鬼官魂度朱陵受鍊更生是謂无量普度无窮拔七祖之昇遷超八難之鬼謫永出玄夜之河長辭北府之官七祖既得昇遷皆入南宫受鍊鍊化既畢遂得更生可謂普度无邊廣濟无量朱陵者即南上朱陵宫也有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁若有能寳秘尊重此文則諸天上帝衆聖尊神共所欽敬若輕漏泄慢則身謝三官殃及七祖經既終畢故重有戒言此二章也此已上道君結集魔王三章之旨再開述聞者誦者之功德及顯示敬者慢者之罪福也右正經下章元始无量度人上品妙經註解卷中
