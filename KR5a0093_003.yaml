front:
  text: 元始無量度人上品妙經注解卷下往六
  hash: sha256:2503fdc4e345a330db875dae985244147e2866a5e6bb9a0897d82f3c1e3e59af
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0093_HFL_003-001a, image: hfl/0046/0046-214.png}
body:
  text: 九江冰湖野人薛季昭顯翁注解道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奧難可尋詳道言者道君自序也此二章者指正經上下二章也皆諸天祕章靈魔隱韻盡大梵之至理非塵世之常辭言無音韻美麗曲無華艷宛約自非真人通玄究微莫能詳察也上天所寶祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉上天祕之科禁甚嚴齊金求傳且復告盟十方諸天然後付度今之學者得經誦詠可不心目相應依按科式如或苟貪遍數行立坐卧聊爾妄誦豈不招因果可不畏哉此後序第一段詳述經文玄妙上天寶愛誦持之士可依科禁道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同氣皆當齊心修齊六時行香十遍轉經福德立降消諸不祥無量之文普度無窮天地聖賢且莫逃乎數况學者道心之未固乎同氣之人倘能依科戒修禳亦可轉禍為福此所謂無量之文普度無窮也此後序第二段再述誦經十遍之功可以消諸不祥也道言夫末學道淺或仙品未充運應滅度身經太陰臨過之時同學至人為其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙下末學道工夫日淺仙籍無名大限到來不免歸盡形識雖然當壞却以修真之故身經太陰陰精修鍊方證陽仙此時得同學之士為之修謫鍊度則隨其平日之功行亦可計刻日辰而更生反形證入仙真之道也道言夫天地運終亦當修齊行香誦經星宿錯度日月失昏亦當修齊行香誦經四時失度陰陽不調亦當修齊行香誦經國主有災兵革四興亦當修齊行香誦經疫毒流行兆民死傷亦當修齊行香誦經師友命過亦當修齊行香誦經夫齊戒誦經功德甚重上消天灾保鎮帝王下禳毒害以度兆民生死受賴其楅難勝故曰無量普度天人經者徑也乃修行之捷徑自利利他乃修行第一法普度天人方為道備太上設此一章欲修真之士常運慈心普及一切悉為解厄禳灾陰修善功可也道言凡有是經能為天地帝主兆民行是功德有災之日發心修齊燒香誦經十過皆諸天記名萬神侍衛右别至人剋得為聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也此經功德甚大謫者其福亦大但當體元始說經周回十遍之數道君所以於前序及此處申言之右别者亦如今文牒指揮右件分别也謂此等人决為保舉作太上後聖金闕帝君之侍臣也右道君正經之後序諸天中大梵隱語無量音道君撰此靈書中篇之序元始靈書中篇靈書即八角垂芒之字為靈書八會之音天各八字字各八音道君命天真皇人所襈之字演成靈書之篇也謹按經云是時元始天尊於赤明世界柏陵寶座三日三夜忽然雲霧鬱勃玄陰不解五老上白天尊曰今日侍座所未曾見天尊演教則河海靜默山嶽藏雲今白日晝陰天人惶懼不審何緣天尊告曰今日諸天慶瑞靈應自然玉字焕爛障蔽天光咸令四座暝目伏聽俄然天氣頓啓冥暗豁消五色光明洞照十方忽有靈書字皆一丈見於虛皇之上八角垂芒天尊告曰此靈書八會字無正形其趣宛奧難可尋詳於是授之於天真皇人注解其音分其分度云云切詳靈書無量音所以得聞於天人得傳於下世皆天真皇人之力也今愚所釋八天字義並按天真訓釋略有敷演欲使初真謫者易曉耳東方八天亶婁阿薈無惒禍觀貫音八字皇曾天隱語亶婁者天中玉京山下有樓亶然高遠阿者阿那掌樓神也玄都每經三日夜鳴鼓集真薈臺名無惒者太無虛空中有惒門天中日月每會於惒門觀者觀覺天帝名音者靈音也以超度長夜之魂謫此章即帝歌靈音七祖出幽須延明首法攬菩曇八字玉完天隱語須延闕名亦天真諱也明首者元始之都候元始開運即都候啓道法者法輪攬者帝諱菩曇者二真人諱也主超度死魂人誦此章即帝攬度魂死得更生稼那阿奕忽訶流吟八字何童天隱語稼那天中主圖先生之號也阿奕乃天中真人戲園也忽飛天神人之名也訶者訶摩天中人呼元始為訶摩流者流布吟者吟詠謂訶摩當劫運之終開布教法流行諸天而吟詠也人謫此章即訶摩開度注名南宫華都曲麗鮮菩育臻八字平育天隱語華都者即太極青華之都也曲者洞章麗者玉女名也鮮者鮮雲菩者樓名育者帝諱臻者至也言育帝常乘之八景之輪遊觀諸天也人謫此章則天帝乘輪召魔保舉答落大梵散煙慶雲八字文舉天隱語答落者天中宫闕名也大梵者言天尊開運大道流行普度天人也散煙者是天中天人散香煙於答落之庭慶雲者慶元始開化香成雲瑞人謫此章即魂度南宫天人共慶飛灑玉都明魔上門八字摩夷天隱語飛者飛天神王灑者灑落玉者玉真都者酆都言玉真開長夜之户度人出酆都也明者了悟八字之義魔者魔王上門者上帝門下也言魔王遵依上帝門下敕命升度學人人謫此章即魔遵敕命度人於南宫也右六天為欲界無行上首回跖流玄八字越衡天隱語無行者虛無梵氣流行上首者北斗宫名回者轉也跖者履也言元始履空輪轉布化十方流者流晨玉光玄者玄都也言其光照長夜魂度南宫而升玄都也人能誦此章即得神魂受鍊出長夜苦而升朱宫也阿陀龍羅四象吁員八字蒙翳天隱語阿陀者阿丘天中山名龍者龍山也此山與阿陀相去九億萬里羅者天中呼日月為濯曜羅交於阿丘之上四者四極真人宫也象者真人所乘象車也吁者南昌帝諱員者日中仙童名也人謫此章即四極列員童接引右東方九氣青天自然玉字南方八天南爓洞浮玉眸詵詵八字和陽隱語南爓者南方丹天世界有流火之庭爓者火勢也洞浮者洞陽宫火炎浮上玉眸者言得道升真皆諸流火之庭南極真人以火鍊身光如眸子詵詵者受鍊之人詵詵然之多也人誦此章則與真人為侣梵形落空九靈推前八字恭華天隱語梵形是元始在龍漢時號也落空者謂元始不由胎化梵氣結形從空而落九靈者玉都九華真人也推前者乃天中之臺名亦真人推算死魂前生功德拔度之所人謫此章即真人書善九幽得度澤洛菩臺緑羅大千八字宗飄天隱語澤者天中山名洛者真晨道君內名菩者飛天神王之名臺者玉臺也在山澤之陽緑羅者月中夫人字羅英衣緑衣大千者大千世界也人誦此章即得神遊玉臺之中遍覽大千之境眇莽九醜韶遙緣邅八字皇笳天隱語眇莽者混沌之前玉字在延康劫中眇眇然難見龍漢劫後莽莽然大明也九醜者大力鬼獸劫運既開九獸號為九醜之鬼輔三官為使者而考罪福韶者天王之內名謡者謡歌也魔王每歌此以亂人之心心堅固者王即保舉之緣邅者南北二斗君之內諱也人有善功則列名南斗告下魔王不敢害之人有惡業則列名北斗告下魔王得以滅魂人誦此章即善注南籍死不受繫雲上九都飛生自騫八字堂曜天隱語雲上者神王諱也九都者九玄之都有九層之臺飛生者南斗神名自者從也騫者林也人謫此章則魔王開導生路魂遊騫林也那育郁馥摩羅法輪八字端靖天隱語那者天中侍郎內名也育者天關空輪之名郁馥者紫微宫靈童之名常運育輪十回以召真而萬神齊到摩羅者天魔內諱言郁馥一唱則魔王束形入法輪之門人謫此章即魂度金門而上朝紫微之臺也霐持無鏡攬姿運容八字恭慶天隱語霐者天中都監神內名也持者龍淵之名也衆龍蟠乎其中常運東井之華以灌天真無鏡者飛天神王也總主生死之籍閉度學道之人攬姿者三界天門名也人有功行即度出三界之門運容者玄和玉女名也人謫此章則得度三界之門玉女以朱靈之氣太和之津灌于形神上升福德之堂矣馥朗廓奕神纓自宫八字極瑶天隱語馥朗者天中臺名廓奕者神公內名與元始同生每教學仙之人有明八字之音則神公保舉升入更生之門上登玉京之臺神纓者紫微宫靈童也自宫者謂人得此神纓歌無量之章則受自然之氣而歡無窮之齡也人誦此章即自然反形受鍊南宫也右南方三氣丹天自然玉字西方八天刀利禪猷婆泥咎高通八字孔升天隱語刀利者西方世界之號禪者刀利國名猷者南上君內名婆泥者洞陽宫靈童之名咎通者忉利世界魔神也常遏人生路人誦此章即火池受鍊上生刀利宛藪滌色太眇之堂八字皇崖天隱語宛藪者天帝內名滌色者是色界飛天真人名也太眇之堂者化生堂也開度萬生之曆人誦此章即真人降景雲之車載兆上升太眇化生之堂也流羅梵萌景鬱蕭嵎八字極風天隱語流者天帝內名也羅者月中夫人名也梵者飛天真人之名萌者元始天神內諱景者景皇即四極真人鬱者蔚秀即景霄仙人此等諸神並禮玉京之臺開度生魂超出蕭嵎蕭嵎者白素元君蕭宫之嵎人誦此章即升景皇臺見白素元君易邈無寂宛首少都八字孝芒天隱語易邈者天帝內號無寂者天中庭名宛首者道君內號開元始之玄奧演大法以度人少都者日中靈童名也常散日精以灌人形人能誦此章則度出死生也阿繿郁竺華邈延由八字翁重天隱語阿繿者天帝諱也郁者郁默魔王隱名竺者魔王都伯常在欲界謫空歌之洞章也華者言色界光華邈者言欲界溟漠延者束鬼之庭由者禁鬼之房天王詠章則天魔應聲而束身群鬼諸由而伏形人誦此章則魔王保舉而魂度南宫也九開自辨阿那品首八字江由天隱語九開者言玄元始三氣分開為天之九氣自辨者言萬品自三氣而生明明可分辨也阿者阿丘又天王內名也那者那邪神人隱名品首者是此神於人品中拔為善之首而超度之人謫此章即天帝品度遷魂九天無量扶蓋浮羅合神八字阮樂天隱語無量者天中無量大聖之始神也總統飛天之人皆受其品量而得升遷也扶者更生真人之名蓋者玄中福堂之名浮羅者謂幽魂受度而不沉淪徑上浮升入大羅之宫合者慶合也神者神公也謂神公慶合此受度之人也人謫此章即上乘大羅神公慶合玉誕長桑柏空度仙八字曇誓天隱語玉誕者天中玉都也長桑者天中騫林也亦名桑林騫木葉上有大洞之章紫字玉書焕乎上清下有扶桑之樹上森騫木之叢靈雞鳴其上青霞萃其峰神風流反香之草桑林鼓百籟之音神風一鼓洞章成音故曰柏空度仙者飛天神人也人誦此章則神王為開度九幽之魂使升入法輪之門也已上十八天為色界右西方七氣素天自然玉字北方八天玃無自育九日導乾八字霄度天隱語獲無者飛天神王之名自者從也謂此神從龍漢凝氣開劫而自抗不終之劫運育者天帝內名九者天帝乘象輪之車遊九玄之門日者日中靈童導乾者此童導引乾精九陽之氣鍊形化質升上朱宫人誦此章即天帝導氣日童鍊形也坤母東覆形攝上玄八字元洞天隱語坤母者九靈之母太陰之都候東者東海覆者水神此神見形崑崙遏斷東井保劫長存形攝者言坤母形出東海之上攝召鳥母以鳳輦迎學仙之人上玄者謂上升玄都也人此章即得鳳輦來迎鳥母交慶陀羅育邈眇氣合雲八字妙成天隱語陀者天帝內名羅者月夫人名育者神王名邈者羽林監神名也神王常匡御三界保舉學人眇氣者受度後則上升雲氣之眇眇也合雲者言遊神大羅之上與諸天而參合人誦此章即上升雲氣飛神步虛飛天大醜總監上天八字禁上天隱語飛天者十方飛天神王也大者都録之司醜者大伯乃都司宗伯也三界魔王每受命于大伯總者飛天都統之官監者監長夜之官上天者開度學人之魂上升于天中也人誦此章即監領學人開度上升已上四天為無色界沙陀劫量龍漢瑛鮮八字常融天隱語沙者天中沙蘭宫陀者陀丘乃紫微之别館新得道者居之每至劫運一交量度學人功德隨緣開度謂之劫量龍漢者初劫之名瑛者初劫時飛天神名也鮮者南宫日童名也學人得度皆由此童鍊度之人誦此章即得鍊形於朱陵之宫也碧落浮黎空歌保珍八字玉隆天隱語碧者碧霞氣落者飛天神名浮黎者天王隱名空者天中侍晨之名歌者洞章之曲侍晨一嘯音成洞章故曰空歌也保珍者言學仙之徒知此空歌可升為飛天之賓永保劫運珍此玉章人謫此章即乘碧霞之輦而遊玉隆之天也惡奕無品洞妙自真八字梵度天隱語惡奕者天王內名無者太無真人受天王之符度長夜之魂品者品量幽魂之罪福洞者洞明宿對妙者妙化之堂也言人宿對既解乃升入妙化之堂自真者自然與大道而合真矣人誦此章則宿對開明升入妙化元梵恢漠幽寂度人八字賈奕天隱語元梵者元始大梵之氣恢漠者廣而難度冥而難見幽兮寂兮不可名狀度人者此靈音普度天人也人誦此章即超出三界宰制諸天已上四天為種民天右北方五氣玄天自然玉字道言此諸天中大梵隱語無量之音舊文字皆廣長一丈天頁皇人昔書其文以為正音元始覩梵氣流注之餘合而成之字皆周回一丈每八字為一天氣之根凡諸天劫運成毁亦由字之散合雖高聖亦莫曉其字乃命皇人書為正音然後天仙乃得識其文也有知其音能齊而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙道備尅得遊行三界升入金門此音乃梵氣所結祕隱之文上以保鎮天度下以拔濟苦爽誠為無量正音齊誦之則神王下觀俟有功勳則感魔王保舉及道全備則證入仙品此音無所不辟無所不禳無所不度無所不成天頁自然之音也道君再稱述正音功德可以辟邪禳災度世成真皆此天真靈音自然而然者故誦之致飛天下觀上帝遙唱萬神朝禮三界侍軒群祅束首鬼精自亡琳琅振響十方肅清河海靜默山嶽吞煙萬靈振伏招集群仙天無氛穢地無祅塵道君以十四事讚正音冥慧洞清大量玄玄也拔度幽冥增長智慧了達三洞逍遙上清皆由此經則知經之度人其功玄而又玄也右靈書中篇後序元始無量度人上品妙經注解卷下收經臣誦經已竟向來所出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人請還金房玉室無令差互後召復到一如故事精思諸神各還宫訖然後徐徐出室度人經注解後序首元始於始青天寶珠內演說靈寶大法普度天人命天真皇人釋大梵玉字付之道君祕于上館約四萬劫一傳後因龜臺金母即王母憫陽九百六之變親禮玉京請留下世及西漢元封年中七月七日王母下降隨順漢字譯此天篆授之武帝已為第七授然此才一品耳在天卷秩甚多及至晋時左宫仙翁於會稽上虞山感太極徐頁人來勒所授即有靈書下篇及太極真人後序其後兵火經品散落厥後小仙翁葛洪真人於鄭真人思遠處得所受之文止於大量玄玄也其後真真付度靈文層出然皆未有天真皇人之演義前輩皆不敢强為之辭此直解之作所以亦止於大量玄玄也九江冰湖野人薛季昭再述冰湖薛顯翁參注釋經接引初機邦士蔡翔夫憐其苦志與之繡梓大德乙巳經板告成乃涓子月初四日丙午繕裝經帙灑掃東壇遍行進奏天帝御前告旨頒下十方三界星垣雷府地水泉曲嶽瀆城隍九州社令凡屬神祇及掌經教真司去處咸使知聞以闡空玄越五日庚戌因遊西市偕冰湖謁先天濟生雷壇忽蒙九天神威天樞豁落王元帥善題押證盟現報四十四言曰汝奉道敬真何在疑心解經之功無不妙要行道法何在擬議未决凡在一心無不驗也汝作之功皆非虛無只此見者皆為之驚異乃知冰湖解經之誠已達之帝閽矣功詎可量哉五日前冰湖潔東壇有請于天帝五日後豫同謁西壇得報于天將天將者乃天帝之指使也冰湖無心於天將而天將有心於冰湖得非天將奉天帝之命以示人乎豫覩其事咸應速如桴鼓願受經者至心持誦不可視為常典庶乎一誦一禮必獲異驗是亦豫拳拳之望是年是月初十日壬子雷降日廬山羽褐李月陽謹題至大改元歲在戊申九月一日豫宿於先天壇夜夢普濟一氣真人老祖師雷默庵曰先生之名在神霄玉府闡化之功與老夫相亞今為青靈開教宗師遷充集仙府使兼大光明殿掌籍仙官天君即日有虛玄篇贈汝言畢遂覺季昭繼後於重九日乃紫皇飛升之日豫因出南關過谷神庵鮑明甫學真壇內忽見香爐中有光感天君於光中果現此篇賜通玄闡妙青靈開教宗師薛季昭天與之形道與貌法天法地取成效正己正人誰毁譽事君事父以忠孝晦跡韜光喜順時孰知君子有變豹一身萬事備三才探賾索隱明三教會誦老子道德言解以孔子之道較推源釋子寂滅門如露如電如幻泡時乎出有或入無時乎飛超或騰趠皎皎靈臺絶點塵事應物名匪機巧入息出作合天心不目逃兮不膚撓逍遙作箇地行仙蛻却塵囂無鬨鬧顯翁之名仁之稱山水之間心所樂馳神物外何茫然或入黍珠驚夢覺他時丹鳳𠾑丹詔召歸紫府俾諸同學之士是則是效此虛玄篇可刊名印所解度人經前以闡諸人鐵筆辛忠義稽首豫末學道淺曾將度人上品生神九章救苦妙經妄意詳釋者不過欲啓發初真入道之門耳初未嘗萌一毫希覬想自鋟梓印施之後惴惴度日每以妄為强作獲譴於雷霆者為慮豈意天君恕其僣而矜容之褒嘉奬勵靡所不至此虛玄篇乃天君贈豫之章也令豫刊名印所解度人經前以闡諸人自得此篇豫早夜以思兩難明處若行刊印似乎衒名以起或者之議若不刊印似乎泯沒又違天君之命豫再三繹思浮言之議尚可逃也違天之命則吾豈敢豫雖不獲己以所贈之篇刊于卷末然亦終匪豫心之所樂識者鑒之九江冰湖野人薛季昭書勸誦鬱羅蕭臺元始寶誥無上元始黍米珠中鬱羅蕭臺上有寶詰九十六字雲篆垂芒雖已按筆於皇人然未得聞於下世龍漢延康開劫之後天不愛道晋司馬朝假夢馬泳游神玉清鬱羅蕭臺金版玉字現出寶詰勉之朝禮億萬天頁十二萬拜所願皆成聽信而行卒如所欲然則世人誦度人經亦當懸想大羅玉清稱揚寶誥一十二聲心朝元始一十二拜然後誦經共結大羅一段好因果時延祐第三春上元日九江廬山上清大洞寶籙青靈演教通玄闡妙法師九天金闕太宰玉府少卿大光明殿掌籍仙官提點三界鍊度鬼神公事小兆臣薛季昭顯翁坦然子焚香書于雪海心鏡之經壇詰曰三界之上梵氣彌羅上極無上天中之天鬱羅蕭臺玉山上京渺渺金闕森羅淨霐玄元一氣混沌之先寶珠之中玄之又玄開明三景化生諸天億萬天真無鞅數衆旋斗歷箕回度五常巍巍大梵萬道之宗大羅玉清虛無自然至真妙道元始天尊鬱羅蕭臺寶皓紀元謹按道藏教典云寶詰出于無上元始度人經中晋司馬都于建康時有馬泳者功名不遂一夕暴卒遇一神人引至天上令仰面一觀見寶臺現虛空中光彩四出有黃衣道者指示泳曰此鬱羅蕭臺也但禮億萬天真十二萬拜所願皆成汝雖道心堅固奈宿業太重父祖未超若禮臺數足天真加護見世决可致身宰輔身中定入仙品班中泳舉首一觀乃見玉版金字書元始寶誥泳誦之三四默記不忘夢覺之後即施金造臺禮拜寶詰一十二萬數完果致榮顯澤及子孫又按神霄録纂要云宋徽宗政和三年十月間有旨啓建祝聖羅天大醮時金門羽客宣和凝神兩殿侍宸林靈素邀駕來日觀天瑞像次夜仙鶴盈空天香滿席月明如晝上親見寶臺九層金牌玉篆鬱羅蕭臺四字在上臺前玉女捧香金童持節天丁環繞帝指示衆仰觀皆無所覩惟帝與虛靖天師張真人繼先金門羽客兩殿侍宸林真人靈素太素大夫凝神殿侍宸王真人文卿左右街道録東海徐真人知常等數人得覩嘉祥餘皆弗見是夜醮散天色如舊天下州郡捧表稱賀敕降寶臺圖本付各宫觀時王侍宸真人慨衆目之無覩乃慈悲而說與衆聽汝可洗心投誠懺悔至誠皈向稱揚寶誥上可祈晴禱雨下可保國寧家為己為人增福延壽禳灾度厄積日纍功朝禮數完展轉開化無不如願衆皆聽信受持跪禮以謝小兆臣薛季昭頓首上言臣恭聞太上有言人身難得中土難生假使得生正法難過因思耳目聰明男子身乾坤賦豫不為貧可自暴自棄哉故自明經取紫之願不酬而知白守黑之志彌篤致蒙雙橋雷真人夢授不言之㫖玉樞辛天君光降虛玄之篇乃不自揣昭以使昭集注靈寶度人經之妙義開述度人經中三界修進指掌圖說並諸經詰道法分章音注及解釋金剛華嚴諸佛經義以勸讀誦無非體古之君子與人為善之心心猶未已再為拈出晋馬泳禮鬱羅一段元始寶誥公案與道俗持誦度人經者交互勸勉是亦拔樹尋根泝流推源大哉元始可自昧乎小兆臣薛季昭謹言
