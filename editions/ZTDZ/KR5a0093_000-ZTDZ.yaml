front:
  text: 元始无量度人上品妙經註解徃四
  hash: sha256:3093f573500f92593afc0d956625729c6423cdc45d4189a238f77b672d594166
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0093_SJB_000-020440b, image: sjb/02/020440b.png}
body:
  text: 進經表小兆臣薛季昭誠惶誠恐稽首頓首再拜上言臣聞黍珠造化因元始以泄玄靈寳本章賴道君而演化天不愛道世得見經誠爲混沌赤文名曰上品妙首元綱流演則三十二帝神文營衛則二十四人上消天災下禳毒害故輕泄漏慢者身經地獄而供養尊禮者位登仙公然世人誦詠雖多於經旨通明者少先賢非無箋註多入幽玄末學未易通融益滋疑惑心如昧昧音謾琅琅臣季昭等是凡夫好參玄竅師傳心印帥顯雷壇愧無寸功可消三惡助六經之句解參諸老之玄談集成一家廣開衆目不敢施於上道祇接引於下根隨字發明逐章剖析但欲焕聖言於日月焉能免罪咎於丘山祈帝之恩恕臣之僣臣誠惶誠恐稽首頓首再拜恭惟无上大羅三境金闕玉皇上帝玉陛下開明三景化生諸天玄座說經同時稱善生死受賴爲福難勝玄奥可詳度人無量伏望憫臣未消穢氣念臣好學至經通玄究微粗悉其章焚香誦經願成此志仰蒙帝祐獲就良因了積年未了之心開夙世罔開之眼利施六天之下是男是女咸得長生庶幾一日之間無智無愚皆可入道彼此俱無妄想祖宗但願昇遷仍請護持相傳乆遠昔諸天記人功過毫分無失今一國傾心歸仰喜慶難言臣下情無任瞻天望聖昧死俯伏謝罪祈恩之至謹言大德七年甲辰上元日小兆臣薛季昭上表
  hash: sha256:41aa0604371cc3d8235843512b3775cdbab3d6f9b672b8e76d87c03347dc75ff
