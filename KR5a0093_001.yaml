front:
  text: 元始無量度人上品妙經注解卷上
  hash: sha256:74234ee6a809671855a83ed8507793626024e628fa987262334b158b635f2b23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0093_HFL_001-001a, image: hfl/0046/0046-094.png}
body:
  text: 九江冰湖野人薛季昭顯翁注解太上洞玄靈寶無量度人上品妙經太上者即玉晨高上大道君也元始天尊之弟子太微天帝君之師居上清上元玉宸宫既授以經因正題首標之洞者三洞即洞真洞玄洞神也玄者妙也散則為經斂則為道靈寶者即三寶之中一章按生神章經云龍漢開圖化生靈寶君至赤明元年出書度人時號上清玄都玉京七寶紫微宫道君所居之天也此度人經是太上道君靈寶天尊所集故曰靈寶無量者不可限量言其多也度人者開度衆生也上品者上上度人之極品也妙經者妙即玄也經即徑也此經乃度人玄妙之捷徑道言昔於始青天中此經元始授之道君凡道言者即道君編述之言也道君言我於往昔無量劫在始青天中時此天即北方八天中說碧落浮黎空歌保珍之一天道藏云欲界六天自東方第一太皇天至第六上明天為欲界此天劫到大火焚燬色界十八天自東方第七虛無天至西方第八無極天為色界此天劫到大水流蕩無色界四天自北方第一皓庭天至第四太素天已上為無色界此天劫到大風吹散又自北方第五天至第八天乃四種民天也雖總曰無色界然此天劫劫長存水火風皆不能到也三界劫壞此天聖人又開化人種始青天乃四種民之一天如在上宰制劫運化生諸天也碧落空歌大浮黎土說始青天中青碧梵氣豁落無邊其中天人空洞之歌交相響答浮黎者始青天王國王隱名受元始度人無量上品道君說我於始青天中受得此上上經品此道君序天尊說經之初元始天尊當說是經周回十過以召十方始當詣座道君說天尊當初說經周回十次普召十方然後就座過者遍也十方者東南西北四方東北東南西南西北四維上下方數始于一終于十十遍則始終周遍矣天真大神上聖高尊妙行真人無鞅數衆乘空而來此指得道修證成真之人皆來聽天尊說經無鞅者無數之義乘空者馭氣乘虛來至說經之所飛雲丹霄緑輿瓊輪羽蓋垂蔭此言一時聽法而來儀飾如此流精玉光五色鬱勃洞焕太空七日七夜此言諸仙精鍊成真內養五臟光華發外則成五色朗照虛空久而不散鬱勃者茂盛之義洞焕者光徹之義諸天晝夜不此人間也道君顯諸天真皆來聽法諸天日月星宿璇璣玉衡一時停輪天天皆有三光為聽經故暫停輪轉璇璣者斗府也玉衡者斗柄也神風靜默山海藏雲天無浮翳四氣朗清萬緣絶靜一塵不留也一國地土山川林木緬平一等無復高下指大浮黎土之中一樣平等無有高低也土皆作碧玉無有異色衆頁侍坐無異色者土與碧玉一般樣也經曰說法之所宫殿皆成七寶道君顯天尊道力化現元始天尊玄座空浮五色師子之上天尊懸虛而升座馭氣而浮空皆不著於有相無相師子乃百獸之王表天尊御此之上高出諸天五色者法相光明也說經一遍諸天大聖同時稱善一遍才周諸天中人隨根器而各有悟入皆稱其好是時一國男女聾病耳皆開聰說經二遍盲者目明說經三遍喑者能言說經四遍跛痾積逮皆能起行說經五遍久病痼疾一時復形說經六遍髮白反黑齒落更生說經七遍老者反壯少者皆强說經八遍婦人懷妊鳥獸含胎已生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人說經一遍召東方時聾者聽說經二遍召南方時目盲者見說經三遍召西方時口啞者聲說經四遍召北方時足跛者行說經五遍召東北方時久病廢病體完說經六遍召東南方髮白反黑齒落重生說經七遍召西南方衰老者健少弱者勇說經八遍召西北方凡已生未生者皆得成形說經九遍召上方時地下伏藏皆現光彩說經十遍召下方時枯骸朽骨起死回生是時一國是男是女莫不傾心皆受護度咸得長生說經之時不揀男女皆沾福力已生天者因經護度未度世者因經長生此道君序天尊說經之效也道言是時元始天尊說經一遍東方無極無量品至頁大神無鞅之衆浮空而至說經二遍南方無極無量品至真大神無鞅之衆浮空而至說經三遍西方無極無量品至頁大神無鞅之衆浮空而至說經四遍北方無極無量品至真大神無鞅之衆浮空而至說經五遍東北無極無量品至真大神無鞅之衆浮空而至說經六遍東南無極無量品至真大神無鞅之衆浮空而至說經七遍西南無極無量品至真大神無鞅之衆浮空而至說經八遍西北無極無量品至真大神無鞅之衆浮空而至說經九遍上方無極無量品至真大神無鞅之衆浮空而至說經十遍下方無極無量品至真大神無鞅之衆浮空而至道藏云東方安太堂鄉納善世界南方宛黎城境棄賢世界西方福堂洲咸行世界北方鬱單野清淨世界東北福集鄉長安世界東南元福田用賢世界西南延福鄉仁靜世界西北福德鄉延賢世界上方三十二天玄都玉京紫微之中諸天真衆下方五嶽九壘洞淵水府北都羅酆三十六宫地下諸真神衆也十遍周竟十方無極天真大神一時同至一國男女傾心歸仰來者有如細雨密霧無鞅之衆迮國一半土皆偏陷非可禁止十方皆來不約而同細雨密霧者言其多也迮者傾反似地狹隘不相容者此道君序天尊周回說經而十方皈向也於是元始懸一寶珠於是天尊示寶珠像方便開度顯聖别凡大如黍米在空玄之中去地五丈黍米至微之物珠之小者如之天尊現此珠虛空中地之相去有五丈遠此等妙理非筆可談元始黍珠人人性分具足特為五欲障礙充拓不去所以與其懸遠茍於五欲中能離去之則一點靈光照天照地與元始黍珠何異哉元始登引天頁大神上聖高尊妙行真人十方無極至頁大神無鞅數衆俱入寶珠之中天尊慈悲懸珠示人先登珠內引示衆真道君顯天尊示珠方便天人仰看浮黎天人尚有纍在止可仰觀寶珠不能從有入無惟見勃勃從珠口中入既入珠口不知所在諸天人但見衆真群入珠口無跡可見矣國人廓散地還平正無復欹陷道既復隱地復還元元始即於寶珠之內說經都竟衆真監度以授於我天尊既引衆真升玄入妙即於珠內傳道說法太上道君親承其旨都竟者圓滿也監度者監臨開度也當此之時喜慶難言法事粗悉諸天復位倏欻之間寂無遺響粗者略也悉者詳也大道不須略通線路即悟真玄所以喜悅復位者各歸元位寂者無聲音之可聞也道君顯天人聖凡不同是時天人遇值經法普得濟度全其本年無有中傷當時浮黎國土天人滯於有形雖不得入寶珠之內然得遇天尊假此因緣皆受濟度無有中路天傷天年者惟解悟真常則證入虛無妙道傾土歸仰咸行善心盡一國土莫不歸向修習下文十二善業不殺不害不嫉不妬不淫不盜不貪不欲不憎不𡜍言無華綺口無惡聲此十二善業也斷一切命曰殺陷一切物曰害毁人成功曰嫉忌人勝已曰妬非色而染曰淫取物不義曰盜好奪無厭曰貪妄起心意曰欲妬嫌他人曰憎欺人自能曰𡜍花言巧語謂之華𦂶出口不遜謂之惡聲齊同慈愛骨成親三業既除六根清淨一體同觀有甚親𨃀國安民豐欣樂太平善緣純熟惡念消融國安無事民樂太平若人於十二時中心地清淨齊物我無怨惡亦是自心太平也經始出教一國以道預有至心宗奉禮敬皆得度世道君言我當初受經于天尊然後出經於一國普教天人宿有修證者生希有相崇重信向由凡而修可以入聖度世者超出凡世也此道君勸人修十二善業之因緣也已上道君序受經之始末道言元始天尊說經中所言並是諸天上帝內名隱韻之音亦是魔王內辭百靈之隱名也非世之常辭內名隱韻者如帝鬱繿玉明至大擇法門是也魔王內譯者如巴元醜伯至流鈴八衛是也百靈隱名者如中有度人不死之神以至桃康合延是也此皆非世俗尋常之句語也此道君詳說經由之所言上聖已成真人通玄究微能悉其章誦之十偏諸天遙唱萬帝設禮河海靜默山歡藏雲日月停景璇璣不行群魔東形鬼精滅爽回尸起死白骨成人高天上聖皆從元始祖氣分真降神故能通達玄妙窮窮精微書詳其㫖體天尊周回十過而誦之諸天遠聞而唱詠萬帝親近而拜禮河海神為聽經而寂靜山嶽神為聽經而嶽雲七曜不行而停光魔精東形而消滅已死者可回尸白骨者可成人道君序上品之人誦經因果至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼祅滅爽濟度垂死絶而得生至心學道之士亦如此誦經十過五方五帝三辦萬靈皆來拱護尊敬其人魔鬼可以消伏死絶可以回生道君序中品之人誦經因果所以爾者學士穖氣未消體未洞真召制十方威未制天政德可伏御地只束縛魔靈但卻死而已不能更生爾者近也近來學者心雖不染於六塵而穖氣未盡於消滅體雖未洞達於真玄而十方已聽於如役威雖未可以制御天之七政而德已可以制伏地之神祗身雖未可超證而更生其人亦可脫無常而却死道君序下品人誦經因果輕誦此章身則被殃供餋尊禮門戶興隆世昌熾興善因緣萬災不干神明護門輕誦則受惡報敬誦則受善報身前則門戶興旺身後則子孫衆多不特自已無災且有神明拱侍也此道君闡述敬慢者罪禍斯經尊妙獨步玉京度人無量為萬道之宗巍巍大梵德難可勝玉京者玉山上京也大梵者大梵真氣也此經梵氣八會結成度人功德何可勝言所以獨步玉京之上道君總結此經功力不可思義道言凡誦是經十過諸天齊到億曾萬祖幽魂苦爽皆即受度上升朱宫格皆九年受化更生得為貴人大凡謫經十方諸天皆來作證纍劫宗親悉得解脫從鍊度格入貴人品朱宫者南方世界中朱陵火府也府有流火之庭大凡度世者皆從朱宫煅煉穢質而成仙骨格有三等上者三年中者九年下者二十四年指中等鍊度格式也道君序誦經者死魂有超度格而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也心之愛曰好此言以靈寶修心者也功行圓滿七祖同升紫金闕白玉京皆大羅玉清之境道君序好者之功優於謫上學之士修誦是經皆即受度飛升南宫上等學人既誦詠之又修行之不拘南宫限格徑可超升道君序修誦兩全者又優於好經者也世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得反形遊行太空世間男女受經於人而誦之者在世决可長年身後不由地府即得反形而尸解精神飛行於太虛尸解者謂形雖死而神不滅也道君勉世人受誦有如此因果此經微妙普度無窮一切天人莫不受慶無量之楅生死蒙惠此度人經功德無量上而諸天下而諸人生者死者莫不賴之道君總結一切修誦受持决可得楅上天所寶不傳下世至士齎金寶效心盟天而傳至心修道者欲得此經必將質信重設盟誓告天而傳表經之不可易得也此道君述經之不可輕傳也輕泄漏慢殃及九祖長役鬼官輕忽泄瀆漏逗慢易此不敬信者纍及九祖落命之後受役鬼官如推沙走石塞山填海踏雷車搖電火受此等苦無有出期是曰長役鬼官也道君述受經者不可輕慢侍經五帝玉童玉女各二十四人營衛神文保護受經者身才開經卷便有神衛五方五帝各勑玉童玉女二十四人來衛護之玉童玉女者修鍊純粹無穢質也各者總五五數合一百二十者也身指受誦此經者之身也此道君述開卷誦經則有諸神便來衛護道言正月長齊誦詠是經為上世亡魂斷地逮役度上南宫正月上元天官賜福此月齊誦可以斷除久遠先亡受地府連逮之苦役其魂神可超升赤明天宫受南昌之鍊度七月長齊誦詠是經身得神仙諸天書名黃籙白簡削死上生七月中元地官赦罪此月齊謫可入仙階天真記名簡録之士北斗削落死籍南斗注上生名十月長齊誦詠是經為國王帝主君臣父子安鎮國祚保天長存世世不絶常為人君安鎮其方民稱太平十月下元水官解厄此月齊誦可保劫運君民蒙福八節之日誦詠是經得為九宫真人立春春分立夏夏至立秋秋分立冬冬至此八節也感應篇云此等日分三官九署紏録罪福八節齊誦可增善果命過之後神生九天九宫者即生神九天宫也本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清本命日即自身本命日辰也此日身中元辰飛奏罪福學人若能齊誦則生有善力死無惡趣坐則三界侍傍而翊衛行則五帝伺動而前迎人多感此但觀古人云法行先天一氣將用自己元辰便可以意悟此述三元八節本命吉日修誦因果耳道君序學士修誦之功用也道言行道之日皆當香湯沐浴齊戒入室東向叩齒三十二通上聞三十二天心拜三十二過此道言以下皆修誦之法不用讀誦但依此存想行道者將演經也沐髮浴體齊心持戒蓋欲交接天人真氣也入淨室東向迎生氣而坐叩齒所以集一身之神以召萬靈每叩一通令響應一天存我起拜三十二天帝從皇曾天以次一一密謫天名須存見天宫樓閣帝君及左右儼然隨心跪拜知身親朝禮之狀閉目靜思身坐青黃白三色雲氣之中收光內視不雜妄想三色雲氣者三境玄元始梵氣也存我坐下有三色青黃白氣內外蓊冥有青龍白虎朱雀玄武師子白鶴羅列左右內徹五臟外盈一室蓊鬱冥合常繞經案存青氣從肝自眼中出化青龍居于左白氣從肺自鼻中出化白虎居于右赤氣從心自口中出化朱雀居于前黑氣從腎自耳出化玄武居于後次存師子盛猛之獸白鶴鮮潔之禽羅布左右日月照明洞焕室內眉後兩小冗為六合之府存日月自中出太陽自左冗出紫赤色光九芒太陰自右冗出黃白色光十芒一云左目為日右目為月一室之內金紫光燦項生圓象光映十方如此分明存日月光芒灌我鼻中入腦後四寸金華宫圓象出項後大如車輪光照內外一一分明如親目所見也密呪曰依下文召出身中衆神無上玄元太上大道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出默存自身中出各各裝嚴森列左右前後關啓所言今日吉慶長齊清堂修行至經無量度人受法籙者即具位如未受法籙者即云奉道弟子某盡心所欲言亦貴簡當若知夫三洞中盟之道見行事則言修行至經自非此人即不言但云清堂謫經若為十方幽普則言無量度人若為一事而誦則言為某事誦經臣及甲乙轉經受生願所啓上徹徑御無上三十二天元始上帝至尊几前臣及甲乙者若為己為人則言臣及某人若自看謫止稱自己姓名轉經受生若為他人則言臣為某人蓋心不兼二也貴在精誠上達諸天上帝之前祝畢引氣三十二過東向誦經從皇曾天始一一稱揚名號每存本天中真氣一如玉霞之輝下灌我身以鼻引口吸流入五臟之中內外虛白即向東迎生氣而持謫也右正經之前序已上道君示學士修誦之法也元始無量度人上品妙經注解卷上
